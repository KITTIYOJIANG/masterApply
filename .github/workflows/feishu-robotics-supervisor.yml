name: Feishu Robotics Supervisor

on:
  schedule:
    # GitHub cron uses UTC. These run at Asia/Shanghai 08:10, 22:10, and Sunday 21:10.
    # Avoiding minute 0 reduces the chance of scheduled workflow delay or drop.
    - cron: "10 0 * * *"
    - cron: "10 14 * * *"
    - cron: "10 13 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Card mode to send"
        type: choice
        required: true
        default: "morning"
        options:
          - morning
          - evening
          - sunday

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send morning card
        if: github.event_name == 'schedule' && github.event.schedule == '10 0 * * *'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
        run: python automation/feishu_supervisor.py --mode morning

      - name: Send evening card
        if: github.event_name == 'schedule' && github.event.schedule == '10 14 * * *'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
        run: python automation/feishu_supervisor.py --mode evening

      - name: Send sunday review card
        if: github.event_name == 'schedule' && github.event.schedule == '10 13 * * 0'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
        run: python automation/feishu_supervisor.py --mode sunday

      - name: Send manual card
        if: github.event_name == 'workflow_dispatch'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
        run: python automation/feishu_supervisor.py --mode "${{ inputs.mode }}"
